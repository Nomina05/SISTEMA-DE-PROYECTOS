<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Procesos PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx"></script>

<style>
:root{
  --azul:#0d47a1; --bg:#f4f6fb; --card:#fff; --borde:#e5e7eb;
  --verde:#2ecc71; --rojo:#e74c3c; --gris:#bdc3c7;
}
body{margin:0;font-family:Segoe UI;background:var(--bg)}
header{background:var(--azul);color:#fff;padding:12px;display:flex;justify-content:space-between}
.layout{display:grid;grid-template-columns:230px 1fr}
.nav{background:#0b3a85;color:#fff;padding:10px}
.nav button{width:100%;padding:10px;margin:4px 0;border:none;background:transparent;color:#fff;cursor:pointer}
.nav button:hover{background:rgba(255,255,255,.1)}

.main{padding:15px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}

input, textarea, select{padding:10px;border:1px solid #ccc;border-radius:8px;font-family:Segoe UI}
textarea{width:100%;min-height:80px;box-sizing:border-box;resize:vertical;margin-top:8px}
button{padding:8px 10px;border:none;border-radius:8px;cursor:pointer;margin-top:5px}
.btn-primary{background:var(--azul);color:#fff}
.btn-success{background:var(--verde);color:#fff}
.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;align-items:center}
.tabla{width:100%;border-collapse:collapse;margin-top:10px;background:#fff}
.tabla th,.tabla td{border-bottom:1px solid var(--borde);padding:8px;text-align:left;font-size:14px}
.tabla th{background:#f8fafc}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{text-align:center;background:#fff;padding:10px;border-radius:10px}

.proceso{background:#fff;padding:12px;border-radius:10px;margin-top:10px}
.proceso-resumen{display:grid;grid-template-columns:minmax(180px,1.4fr) repeat(4,minmax(120px,1fr)) auto;gap:10px;align-items:center}
.proceso-resumen small{display:block;color:#64748b}
.estado-compacto{font-weight:700}
.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin:12px 0}
.kanban-columna{background:#f8fafc;border:1px solid var(--borde);border-radius:10px;padding:10px;min-height:120px}
.kanban-columna h4{margin:0 0 8px}
.kanban-tarjeta{background:#fff;border:1px solid var(--borde);border-left:4px solid var(--azul);border-radius:8px;padding:8px;margin-top:8px;font-size:13px}
.kanban-tarjeta small{display:block;color:#64748b;margin-top:4px}
.embedded-tabs{display:none;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.embedded-tabs button{margin-top:0;background:#e8eef8;color:#17324d;font-weight:700}
.embedded-tabs button.activo{background:var(--azul);color:#fff}
.messages{position:relative;display:flex;justify-content:flex-end;margin-bottom:12px}
.messages button{margin-top:0;background:#e8eef8;color:#17324d;font-weight:700}
.messages-count{min-width:20px;min-height:20px;margin-left:6px;border-radius:999px;background:#e74c3c;color:#fff;display:inline-grid;place-items:center;font-size:11px}
.messages-panel{position:absolute;right:0;top:calc(100% + 6px);z-index:40;width:min(430px,calc(100vw - 30px));padding:12px;border:1px solid var(--borde);border-radius:10px;background:#fff;box-shadow:0 12px 30px rgba(0,0,0,.14)}
.messages-item{padding:9px 0;border-bottom:1px solid var(--borde)}
.messages-item:last-child{border-bottom:0}
.timeline{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:10px}
.etapa{text-align:center}
.rol-etapa{display:block;color:#64748b;font-size:11px;margin-top:4px}
.circle{width:25px;height:25px;border-radius:50%;margin:auto}
.completado{background:var(--verde)}
.activo{background:#3498db}
.pendiente{background:var(--gris)}

.historial{margin-top:10px;font-size:13px;background:#fafafa;padding:8px;border-radius:8px}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;
}
.drawer{
position:fixed;top:0;right:0;width:min(720px,100%);height:100%;background:#fff;
box-shadow:-12px 0 30px rgba(0,0,0,.18);z-index:30;transform:translateX(100%);
transition:transform .2s ease;padding:18px;box-sizing:border-box;overflow:auto;
}
.drawer.abierto{transform:translateX(0)}
.drawer-head{display:flex;justify-content:space-between;gap:12px;align-items:start}
.modal-box{background:#fff;padding:20px;border-radius:10px;width:330px}

.nota{
background:#eef3ff;
padding:6px;
border-radius:6px;
margin:4px 0;
}
.checklist{display:grid;gap:5px;margin-top:8px}
.checklist span.ok{color:#15803d}
.checklist span.falta{color:#b91c1c}
.acciones-secundarias{display:flex;gap:6px;flex-wrap:wrap}

.alertas{
position:fixed;
left:15px;
bottom:15px;
width:min(360px,calc(100% - 30px));
z-index:20;
display:flex;
flex-direction:column;
gap:8px;
}
.alerta{
background:#fff7e6;
border-left:5px solid #f39c12;
box-shadow:0 8px 24px rgba(0,0,0,.18);
padding:10px 12px;
border-radius:8px;
font-size:13px;
color:#5f3b00;
}
.alerta b{display:block;margin-bottom:3px}
body.embedded{background:transparent}
body.embedded header,
body.embedded .nav{display:none}
body.embedded .layout{display:block}
body.embedded .main{padding:0}
body.embedded .embedded-tabs{display:none}
body.embedded .card,
body.embedded .proceso,
body.embedded .kpi{border:1px solid var(--borde);box-shadow:none}
@media(max-width:900px){.proceso-resumen{grid-template-columns:1fr}.drawer{width:100%}}
</style>
</head>

<body>

<header>
  <b>Compras y Contrataciones</b>
  <span id="clock"></span>
</header>

<div class="layout">

<div class="nav">
  <button onclick="vista('usuarios')">Usuarios</button>
  <button onclick="vista('reg')">Registro</button>
  <button onclick="vista('dash')">Dashboard</button>
  <button onclick="vista('proc')">Procesos</button>
</div>

<div class="main">
<div class="messages">
  <button type="button" id="purchaseMessagesBtn">Mensajes <span class="messages-count" id="purchaseMessagesCount">0</span></button>
  <div class="messages-panel" id="purchaseMessagesPanel" hidden></div>
</div>
<div class="embedded-tabs" aria-label="Vistas de compras y contrataciones">
  <button type="button" data-vista="reg" onclick="vista('reg')">Nueva solicitud</button>
  <button type="button" data-vista="dash" onclick="vista('dash')">Dashboard</button>
  <button type="button" data-vista="proc" onclick="vista('proc')">Procesos</button>
</div>

<!-- USUARIOS -->
<div id="usuarios">
<div class="card">
<h3>Registro de usuarios</h3>
<div class="form-grid">
<input id="nombreUsuario" placeholder="Nombre completo">
<input id="correoUsuario" placeholder="Usuario o correo">
<select id="rolUsuario">
  <option value="">Rol</option>
  <option>Solicitante</option>
  <option>Compras</option>
  <option>Legal</option>
  <option>Dirección</option>
  <option>Administrador</option>
</select>
<input id="departamentoUsuario" placeholder="Departamento">
</div>
<button class="btn-primary" onclick="crearUsuario()">Registrar usuario</button>
<table class="tabla">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Usuario/Correo</th>
      <th>Rol</th>
      <th>Departamento</th>
      <th>Acción</th>
    </tr>
  </thead>
  <tbody id="listaUsuarios"></tbody>
</table>
</div>
</div>

<!-- REGISTRO -->
<div id="reg" style="display:none">
<div class="card">
<select id="user">
  <option value="">Seleccione usuario</option>
</select>
<select id="tipoSolicitud">
  <option value="Compra">Compra</option>
  <option value="Servicio">Servicio</option>
</select>
<select id="esActivo">
  <option value="false">No es activo</option>
  <option value="true">Es activo</option>
</select>
<input id="desc" placeholder="Descripción">
<button class="btn-primary" onclick="crear().catch(error=>alert(error.message||'No se pudo guardar la solicitud'))">Crear</button>
</div>
</div>

<!-- DASH -->
<div id="dash" style="display:none">
<div class="kpis">
<div class="kpi"><b id="t"></b><br>Total</div>
<div class="kpi"><b id="c"></b><br>Completados</div>
<div class="kpi"><b id="p"></b><br>Pendientes</div>
<div class="kpi"><b id="avg"></b><br>Promedio</div>
</div>
<canvas id="chart"></canvas>
<div class="card" id="dashboardCompras"></div>
</div>

<!-- PROCESOS -->
<div id="proc" style="display:none">
<input placeholder="Buscar..." oninput="buscar(this.value)">
<div class="kanban" id="kanban"></div>
<div id="lista"></div>
</div>

</div>
</div>

<div class="alertas" id="alertas"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h4>Confirmar avance</h4>
<p id="rolResponsableActual"></p>
<select id="actor">
  <option value="">Seleccione usuario</option>
</select>
<textarea id="avanceNota" placeholder="Descripción o nota del proceso"></textarea>
<button class="btn-primary" onclick="confirmar().catch(error=>alert(error.message||'No se pudo guardar el avance'))">Aceptar</button>
<button onclick="cerrarModal()">Cancelar</button>
</div>
</div>
<aside class="drawer" id="detalleDrawer">
  <div class="drawer-head">
    <div>
      <h3 id="detalleTitulo"></h3>
      <small id="detalleSubtitulo"></small>
    </div>
    <button onclick="cerrarDetalle()">Cerrar</button>
  </div>
  <div id="detalleContenido"></div>
</aside>

<script>

let procesos = JSON.parse(localStorage.getItem('data')||'[]');
let usuariosRegistrados = [];
const PROJECT_USERS_KEY = 'coraamoca-system-v7-base-datos-1-supabase';
const ETAPAS = [
  'Solicitud de compra o servicio',
  'Revisión y firma de Administración',
  'Validación en PAC',
  'Recepción en Finanzas',
  'Firma de Dirección General',
  'Carga en portal SECP - En proceso',
  'Apertura de sobre',
  'Evaluación de ofertas',
  'Adjudicación',
  'Orden de compra o servicio',
  'Contrato legal',
  'Registro y control interno',
  'Certificación remitida a Compras',
  'Notificación a oferentes',
  'Registro de factura en almacén',
  'Validación de entrada e inicio de pago',
  'Revisión y análisis',
  'Remisión a Financiero',
  'Pago financiero',
  'Tesorería y certificación',
  'Cierre del proceso'
];
const ETAPA_FACTURA_ALMACEN = 'Registro de factura en almacén';
const GRUPOS_KANBAN = ['Solicitud','Validaciones','SECP','Contrato','Recepción','Pago','Cierre'];
const ROLES_ETAPA = {
  'Solicitud de compra o servicio':'Encargado de área',
  'Revisión y firma de Administración':'Administración',
  'Validación en PAC':'Compras y Contrataciones',
  'Recepción en Finanzas':'Finanzas',
  'Firma de Dirección General':'Dirección General',
  'Carga en portal SECP - En proceso':'Compras y Contrataciones',
  'Apertura de sobre':'Compras y Contrataciones',
  'Evaluación de ofertas':'Compras y Contrataciones',
  'Adjudicación':'Compras y Finanzas',
  'Orden de compra o servicio':'Compras y Contrataciones',
  'Contrato legal':'Legal',
  'Registro y control interno':'Unidad Interna de Registro y Control Interno de Contratos',
  'Certificación remitida a Compras':'Unidad Interna de Registro y Control Interno de Contratos',
  'Notificación a oferentes':'Compras y Contrataciones',
  'Registro de factura en almacén':'Almacén',
  'Validación de entrada e inicio de pago':'Compras y Contrataciones',
  'Revisión y análisis':'Revisión y Análisis',
  'Remisión a Financiero':'Revisión y Análisis',
  'Pago financiero':'Finanzas',
  'Tesorería y certificación':'Tesorería',
  'Cierre del proceso':'Compras y Contrataciones'
};
const DOCUMENTOS_REQUERIDOS = {
  'Validación en PAC':['Solicitud firmada'],
  'Contrato legal':['Adjudicación','Orden de compra o servicio'],
  'Registro de factura en almacén':['Factura'],
  'Pago financiero':['Expediente auditado']
};
function plazoEtapaHoras(nombre){
  const configured = Number(window.parent?.state?.alertConfig?.horasEtapaCompra || 96);
  return nombre === 'Adjudicación' ? configured : 48;
}
const LIMITE_SIN_AVANCE = 48 * 60 * 60 * 1000;
let idxGlobal = null;
const queryParams = new URLSearchParams(location.search);
const embeddedMode = queryParams.get('embedded') === '1';
const requestedEmbeddedView = queryParams.get('vista') || '';
const allowedEmbeddedViews = new Set((queryParams.get('permitidas') || 'reg,dash,proc').split(',').filter(Boolean));
if(embeddedMode){
  document.body.classList.add('embedded');
  document.querySelectorAll('.embedded-tabs button').forEach(btn=>{
    btn.hidden = !allowedEmbeddedViews.has(btn.dataset.vista);
  });
}

function cargarUsuariosSistema(){
  try{
    const projectState = JSON.parse(localStorage.getItem(PROJECT_USERS_KEY) || '{}');
    usuariosRegistrados = (projectState.users || []).map(u=>({
      id:u.id,
      nombre:u.nombre || u.usuario || u.correo,
      correo:u.correo || u.usuario,
      rol:u.rol || 'Consulta',
      departamento:u.area || ''
    }));
  }catch(error){
    usuariosRegistrados = [];
  }
}

function clienteSupabase(){
  return window.parent?.supabaseClient || window.supabaseClient || null;
}

function usuarioPorId(id){
  return usuariosRegistrados.find(u=>u.id===id);
}

function usuarioActivoSistema(){
  try{
    const projectState = JSON.parse(localStorage.getItem(PROJECT_USERS_KEY) || '{}');
    return (projectState.users || []).find(u=>u.usuario===projectState.activeUser) || null;
  }catch(error){
    return null;
  }
}

function textoAreaUsuario(user){
  return `${user?.area || ''} ${user?.rol || ''}`.toLowerCase();
}

function esAdministradorActivo(){
  return usuarioActivoSistema()?.rol === 'Administrador';
}

function tienePermisoSistema(codigo){
  const user = usuarioActivoSistema();
  return Boolean(user && (user.rol === 'Administrador' || (user.permissions || []).includes(codigo)));
}

function purchaseReadKey(){
  return `purchase-read-${usuarioActivoSistema()?.usuario || 'anon'}`;
}

function purchaseReadIds(){
  try{return JSON.parse(localStorage.getItem(purchaseReadKey()) || '[]')}catch{return []}
}

function unreadPurchases(){
  const read = new Set(purchaseReadIds());
  return procesos.filter(p=>!read.has(String(p.id)));
}

function renderPurchaseMessages(){
  const unread = unreadPurchases();
  purchaseMessagesCount.textContent = unread.length;
  purchaseMessagesPanel.innerHTML = unread.length ? unread.map(p=>`
    <div class="messages-item">
      <b>${p.usuario || 'Sin solicitante'}</b>
      <div>${p.descripcion || '-'}</div>
      <small>${p.id || '-'}</small>
    </div>
  `).join('') : '<div>No hay solicitudes nuevas sin leer.</div>';
}

function markPurchaseMessagesRead(){
  localStorage.setItem(purchaseReadKey(), JSON.stringify(procesos.map(p=>String(p.id))));
  renderPurchaseMessages();
}

function puedeEditarCompras(){
  return esAdministradorActivo() || tienePermisoSistema('compras-datos');
}

function puedeEditarFinanzas(){
  return esAdministradorActivo() || tienePermisoSistema('finanzas-pagos-compras');
}

function etapasParaProceso(esActivo){
  return ETAPAS.filter(etapa=>esActivo || etapa !== ETAPA_FACTURA_ALMACEN);
}

async function cargarProcesosSql(){
  const supabase = clienteSupabase();
  if(!supabase) return;
  const result = await supabase
    .from('procesos_compras')
    .select('*, proceso_etapas(*), proceso_notas(*), proceso_documentos(*), proceso_pagos(*), proceso_devoluciones(*)')
    .order('creado_en', { ascending:false });
  if(result.error) throw result.error;
  procesos = (result.data || []).map(row=>{
    const solicitante = usuarioPorId(row.solicitante_id);
    const etapas = (row.proceso_etapas || [])
      .sort((a,b)=>a.orden-b.orden)
      .filter(etapa=>Boolean(row.es_activo) || etapa.nombre !== ETAPA_FACTURA_ALMACEN)
      .map(etapa=>({
        dbId:etapa.id,
        nombre:etapa.nombre,
        estado:etapa.estado,
        inicio:etapa.inicio ? new Date(etapa.inicio).getTime() : null,
        fin:etapa.fin ? new Date(etapa.fin).getTime() : null
      }));
    const notas = (row.proceso_notas || []).map(nota=>{
      const autor = usuarioPorId(nota.autor_id);
      return {
        dbId:nota.id,
        texto:nota.nota,
        autor:autor?.nombre || 'Usuario',
        autorId:nota.autor_id,
        etapa:'Nota',
        fecha:nota.creado_en ? new Date(nota.creado_en).getTime() : Date.now()
      };
    });
    const documentos = (row.proceso_documentos || []).map(doc=>({
      dbId:doc.id,tipo:doc.tipo,nombre:doc.nombre_archivo,url:doc.url,fecha:doc.creado_en
    }));
    const pagos = (row.proceso_pagos || []).map(pago=>({
      dbId:pago.id,fecha:pago.fecha,monto:Number(pago.monto||0),referencia:pago.referencia||''
    }));
    const devoluciones = (row.proceso_devoluciones || []).map(dev=>({
      dbId:dev.id,etapa:dev.etapa,motivo:dev.motivo,fecha:dev.creado_en
    }));
    return {
      dbId:row.id,
      id:row.expediente,
      usuario:solicitante?.nombre || 'Usuario',
      usuarioId:row.solicitante_id,
      descripcion:row.descripcion,
      tipoSolicitud:row.tipo_solicitud || 'Compra',
      esActivo:Boolean(row.es_activo),
      montoEstimado:Number(row.monto_estimado || 0),
      tipoProceso:row.tipo_proceso || '',
      numeroProceso:row.numero_proceso || '',
      montoAdjudicado:Number(row.monto_adjudicado || 0),
      oferenteAdjudicado:row.oferente_adjudicado || '',
      montoPagado:Number(row.monto_pagado || 0),
      creado:row.creado_en ? new Date(row.creado_en).getTime() : Date.now(),
      ultimoCambio:row.ultimo_cambio ? new Date(row.ultimo_cambio).getTime() : Date.now(),
      etapas,
      historial:[],
      notas,
      documentos,
      pagos,
      devoluciones
    };
  });
}

// ====== VISTA ======
function vista(v){
  if(embeddedMode && !allowedEmbeddedViews.has(v)){
    v = [...allowedEmbeddedViews][0] || 'reg';
  }
  usuarios.style.display='none'; reg.style.display='none'; dash.style.display='none'; proc.style.display='none';
  document.getElementById(v).style.display='block';
  document.querySelectorAll('.embedded-tabs button').forEach(btn=>btn.classList.toggle('activo', btn.dataset.vista===v));
  if(v==='usuarios'){ cargarUsuariosSistema(); renderUsuarios(); }
  if(v==='dash') kpi();
  if(v==='proc') render();
}

if(embeddedMode){
  vista(requestedEmbeddedView || [...allowedEmbeddedViews][0] || 'reg');
}

purchaseMessagesBtn.addEventListener('click',()=>{
  purchaseMessagesPanel.hidden = !purchaseMessagesPanel.hidden;
  if(!purchaseMessagesPanel.hidden) markPurchaseMessagesRead();
});

// ====== USUARIOS ======
function crearUsuario(){
  alert("Los usuarios se administran desde el Sistema de Proyectos.");
  return;
  let nombre = nombreUsuario.value.trim();
  let correo = correoUsuario.value.trim();
  let rol = rolUsuario.value;
  let departamento = departamentoUsuario.value.trim();

  if(!nombre||!correo||!rol||!departamento){
    alert("Complete todos los datos del usuario");
    return;
  }

  if(usuariosRegistrados.some(u=>u.correo.toLowerCase()===correo.toLowerCase())){
    alert("Este usuario ya existe");
    return;
  }

  usuariosRegistrados.push({
    id:'USR-'+Date.now(),
    nombre,
    correo,
    rol,
    departamento,
    creado:Date.now()
  });

  nombreUsuario.value='';
  correoUsuario.value='';
  rolUsuario.value='';
  departamentoUsuario.value='';

  guardarUsuarios();
  renderUsuarios();
  llenarUsuariosProceso();
}

function eliminarUsuario(i){
  alert("Los usuarios se administran desde el Sistema de Proyectos.");
  return;
  if(!confirm("¿Eliminar usuario?")) return;
  usuariosRegistrados.splice(i,1);
  guardarUsuarios();
  renderUsuarios();
  llenarUsuariosProceso();
}

function renderUsuarios(){
  listaUsuarios.innerHTML = usuariosRegistrados.map((u,i)=>`
    <tr>
      <td>${u.nombre}</td>
      <td>${u.correo}</td>
      <td>${u.rol}</td>
      <td>${u.departamento}</td>
      <td><button onclick="eliminarUsuario(${i})">Eliminar</button></td>
    </tr>
  `).join('');
}

function llenarUsuariosProceso(){
  cargarUsuariosSistema();
  let opciones = '<option value="">Seleccione usuario</option>' +
    usuariosRegistrados.map(u=>
      `<option value="${u.id}">${u.nombre} - ${u.rol}</option>`
    ).join('');

  user.innerHTML = opciones;
  actor.innerHTML = opciones;
}

// ====== CREAR ======
function crear(){
  let u=user.value;
  let d=desc.value.trim();
  let activo=esActivo.value === 'true';

  if(!u||!d){ alert("Seleccione un usuario y complete la descripción"); return; }

  if(procesos.some(p=>p.descripcion===d)){
    alert("Ya existe");
    return;
  }

  let id = 'EXP-'+new Date().getFullYear()+'-'+(procesos.length+1).toString().padStart(4,'0');

  let etapas = etapasParaProceso(activo).map((e,i)=>({
    nombre:e,
    estado:i==0?'activo':'pendiente',
    inicio:i==0?Date.now():null,
    fin:null
  }));

  procesos.unshift({
    id, usuario:u, descripcion:d,
    esActivo:activo,
    creado:Date.now(),
    ultimoCambio:Date.now(),
    etapas,
    historial:[{txt:`${u} creó`, fecha:Date.now()}],

  });

async function crear(){
  let usuarioId=user.value;
  let usuario = usuarioPorId(usuarioId);
  let u=usuario?.nombre || '';
  let d=desc.value.trim();
  let tipo=tipoSolicitud.value;
  let activo=esActivo.value === 'true';
  if(!u||!d){ alert("Seleccione un usuario y complete la descripción"); return; }
  if(procesos.some(p=>p.descripcion===d)){ alert("Ya existe"); return; }

  let id = 'EXP-'+new Date().getFullYear()+'-'+(procesos.length+1).toString().padStart(4,'0');
  let etapas = etapasParaProceso(activo).map((e,i)=>({ nombre:e, estado:i==0?'activo':'pendiente', inicio:i==0?Date.now():null, fin:null }));
  let nuevoProceso = { id, usuario:u, usuarioId, descripcion:d, tipoSolicitud:tipo, esActivo:activo, montoEstimado:0, tipoProceso:'', numeroProceso:'', montoAdjudicado:0, oferenteAdjudicado:'', montoPagado:0, creado:Date.now(), ultimoCambio:Date.now(), etapas, historial:[{txt:`${u} creó`, fecha:Date.now()}], notas:[] };

  const supabase = clienteSupabase();
  if(supabase){
    const inserted = await supabase.from('procesos_compras').insert({
      expediente:id,
      descripcion:d,
      solicitante_id:usuarioId || null,
      tipo_solicitud:tipo,
      es_activo:activo,
      estatus:'Pendiente'
    }).select('*').single();
    if(inserted.error) throw inserted.error;
    nuevoProceso.dbId = inserted.data.id;
    const etapasInsertadas = await supabase.from('proceso_etapas').insert(etapas.map((etapa, orden)=>({
      proceso_id:inserted.data.id,
      nombre:etapa.nombre,
      orden,
      estado:etapa.estado,
      inicio:etapa.inicio ? new Date(etapa.inicio).toISOString() : null
    }))).select('*');
    if(etapasInsertadas.error) throw etapasInsertadas.error;
    nuevoProceso.etapas = etapasInsertadas.data.sort((a,b)=>a.orden-b.orden).map(etapa=>({
      dbId:etapa.id,
      nombre:etapa.nombre,
      estado:etapa.estado,
      inicio:etapa.inicio ? new Date(etapa.inicio).getTime() : null,
      fin:etapa.fin ? new Date(etapa.fin).getTime() : null
    }));
  }
  procesos.unshift(nuevoProceso);
  guardar();
  render();
  revisarAlertas();
}

async function confirmar(){
  let actorId = document.getElementById('actor').value.trim();
  let actorUser = usuarioPorId(actorId);
  let actor = actorUser?.nombre || '';
  let nota = document.getElementById('avanceNota').value.trim();
  let p = procesos[idxGlobal];
  if(!actor){ alert("Seleccione el usuario que realiza el avance"); return; }
  if(!nota){ alert("Escriba una descripción o nota del proceso"); return; }
  const faltantes = documentosFaltantes(p);
  if(faltantes.length) return alert(`No puede avanzar. Faltan documentos: ${faltantes.join(', ')}`);

  for(let i=0;i<p.etapas.length;i++){
    let e = p.etapas[i];
    if(e.estado==='activo'){
      e.estado='completado';
      e.fin=Date.now();
      p.historial.push({ txt:`${actor} completó ${e.nombre}. Nota: ${nota}`, fecha:Date.now() });
      p.notas.push({ texto:nota, autor:actor, autorId:actorId, etapa:e.nombre, fecha:Date.now() });
      p.ultimoCambio=Date.now();
      if(p.etapas[i+1]){ p.etapas[i+1].estado='activo'; p.etapas[i+1].inicio=Date.now(); }

      const supabase = clienteSupabase();
      if(supabase && p.dbId){
        const etapaActualizada = await supabase.from('proceso_etapas').update({
          estado:'completado',
          fin:new Date(e.fin).toISOString(),
          actualizado_por:actorId || null
        }).eq('id', e.dbId);
        if(etapaActualizada.error) throw etapaActualizada.error;
        if(p.etapas[i+1]){
          const etapaSiguiente = await supabase.from('proceso_etapas').update({
            estado:'activo',
            inicio:new Date(p.etapas[i+1].inicio).toISOString(),
            actualizado_por:actorId || null
          }).eq('id', p.etapas[i+1].dbId);
          if(etapaSiguiente.error) throw etapaSiguiente.error;
        }
        const notaInsertada = await supabase.from('proceso_notas').insert({
          proceso_id:p.dbId,
          etapa_id:e.dbId,
          nota,
          autor_id:actorId || null
        }).select('*').single();
        if(notaInsertada.error) throw notaInsertada.error;
        p.notas.at(-1).dbId = notaInsertada.data.id;
        const procesoActualizado = await supabase.from('procesos_compras').update({
          estatus:p.etapas.every(etapa=>etapa.estado==='completado') ? 'Completado' : 'En proceso',
          ultimo_cambio:new Date(p.ultimoCambio).toISOString()
        }).eq('id', p.dbId);
        if(procesoActualizado.error) throw procesoActualizado.error;
      }
      break;
    }
  }
  cerrarModal();
  guardar();
  render();
  kpi();
  revisarAlertas();
}

function documentosFaltantes(p){
  const activa = p.etapas.find(etapa=>etapa.estado==='activo')?.nombre;
  const requeridos = DOCUMENTOS_REQUERIDOS[activa] || [];
  const cargados = new Set((p.documentos||[]).map(doc=>doc.tipo));
  return requeridos.filter(tipo=>!cargados.has(tipo));
}

function etapaKanban(proceso){
  if(proceso.etapas.every(e=>e.estado==='completado')) return 'Completado';
  const activa = proceso.etapas.find(e=>e.estado==='activo')?.nombre || '';
  if(activa.includes('Solicitud')) return 'Solicitud';
  if(['Revisión','Validación','Recepción','Firma'].some(txt=>activa.includes(txt))) return 'Validaciones';
  if(['SECP','Apertura','Evaluación','Adjudicación','Orden'].some(txt=>activa.includes(txt))) return 'SECP';
  if(['Contrato','Registro y control','Certificación'].some(txt=>activa.includes(txt))) return 'Contrato';
  if(['Notificación','factura','entrada'].some(txt=>activa.includes(txt))) return 'Recepción';
  if(['Revisión y análisis','Financiero','Pago financiero','Tesorería'].some(txt=>activa.includes(txt))) return 'Pago';
  return 'Cierre';
}

function renderKanban(){
  if(!document.getElementById('kanban')) return;
  const columnas = [...GRUPOS_KANBAN, 'Completado'];
  kanban.innerHTML = columnas.map(columna=>{
    const items = procesos.filter(proceso=>etapaKanban(proceso)===columna);
    return `
      <section class="kanban-columna">
        <h4>${columna} (${items.length})</h4>
        ${items.length ? items.map(proceso=>`
          <article class="kanban-tarjeta">
            <b>${proceso.id}</b>
            <small>${proceso.descripcion}</small>
            <small>${proceso.usuario || 'Sin solicitante'}</small>
            <small>${ROLES_ETAPA[proceso.etapas.find(etapa=>etapa.estado==='activo')?.nombre] || 'Proceso cerrado'}</small>
          </article>
        `).join('') : '<small>Sin solicitudes</small>'}
      </section>
    `;
  }).join('');
}

// ====== ALERTAS 48 HORAS ======
function horasDesde(fecha){
  return Math.floor((Date.now() - fecha) / 3600000);
}

function revisarAlertas(){
  let contenedorAlertas = document.getElementById('alertas');
  if(!contenedorAlertas) return;

  let demorados = procesos.filter(p=>{
    let finalizado = p.etapas.every(e=>e.estado==='completado');
    let activa = p.etapas.find(e=>e.estado==='activo');
    let inicioActivo = activa ? activa.inicio : null;
    let fechaBase = inicioActivo || p.ultimoCambio || p.creado;

    const limiteEtapa = plazoEtapaHoras(activa?.nombre) * 60 * 60 * 1000;
    return !finalizado && fechaBase && (Date.now() - fechaBase) > limiteEtapa;
  });

  if(!demorados.length){
    contenedorAlertas.innerHTML='';
    return;
  }

  contenedorAlertas.innerHTML = demorados.map(p=>{
    let activa = p.etapas.find(e=>e.estado==='activo');
    let fechaBase = (activa && activa.inicio) || p.ultimoCambio || p.creado;
    let horas = horasDesde(fechaBase);

    return `
      <div class="alerta">
        <b>${p.id} sin cambios</b>
        El proceso "${p.descripcion}" no ha avanzado en ${horas} horas. Etapa: ${activa?.nombre || '-'}.
      </div>
    `;
  }).join('');
}

// ====== KPI ======
let ch;
function kpi(){
  let total=procesos.length, comp=0, t=[];

  procesos.forEach(p=>{
    let last=p.etapas.at(-1);
    if(last.fin){
      comp++;
      t.push(last.fin - p.creado);
    }
  });

  t=t.length?(t.reduce((a,b)=>a+b)/t.length/3600000).toFixed(2):0;

  document.getElementById('t').innerText=total;
  document.getElementById('c').innerText=comp;
  document.getElementById('p').innerText=total-comp;
  document.getElementById('avg').innerText=t+'h';

  if(ch) ch.destroy();
  ch=new Chart(chart,{
    type:'doughnut',
    data:{
      labels:['Completados','Pendientes'],
      datasets:[{
        data:[comp,total-comp],
        backgroundColor:['#2ecc71','#e74c3c']
      }]
    }
  });
  const bloques = Object.fromEntries(GRUPOS_KANBAN.map(grupo=>[grupo, procesos.filter(p=>etapaKanban(p)===grupo).length]));
  document.getElementById('p').title = Object.entries(bloques).map(([k,v])=>`${k}: ${v}`).join(' | ');
  dashboardCompras.innerHTML = `<h3>Resumen por etapa</h3>` + Object.entries({...bloques, Completado:procesos.filter(p=>etapaKanban(p)==='Completado').length})
    .map(([etapa,total])=>`<div>${etapa}: <b>${total}</b></div>`).join('');
}

  let ws=XLSX.utils.json_to_sheet(p.historial);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Historial");
  XLSX.writeFile(wb,p.id+".xlsx");
}

function pdf(i){
  let p=procesos[i];
  let doc=new window.jspdf.jsPDF();
  let txt=p.historial.map(h=>h.txt).join('\n');
  doc.text(txt,10,10);
  doc.save(p.id+".pdf");
}
